        <a href="#section1">section1</a>
        <!-- Attributes of a tag -->
        <!-- Default. Same tab -->
         <a href="https://www.google.com/" target="_self">Takes me to Google.com</a>
         <!-- Opens link in New tab -->
         <a href="https://www.google.com/" target="_blank">Takes me to Google.com</a>
         <!-- Parent tag -->
         <a href="https://www.google.com/" target="_parent">Takes me to Google.com</a>
         <!-- Full document body -->
         <a href="https://www.google.com/" target="_top">Takes me to Google.com</a>
